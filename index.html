// Иконка-галочка для всех офферов (единый стиль)
const ICONS = ["ti-check"];

// ============ ПОЛУЧЕНИЕ yclid ============
let tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { try { tg.ready(); tg.expand(); } catch(e) {} }

function getYclid() {
  // 1. Из start_param Telegram Mini App (формат yclid_XXXXXXXX)
  const startParam = tg && tg.initDataUnsafe ? tg.initDataUnsafe.start_param : null;
  if (startParam && startParam.indexOf('yclid_') === 0) {
    return startParam.replace('yclid_', '');
  }
  // 2. Фолбэк — обычный query-параметр (если страница открыта не как TG-диплинк)
  const params = new URLSearchParams(window.location.search);
  if (params.get('yclid')) return params.get('yclid');
  if (params.get('start')) {
    const s = params.get('start');
    if (s.indexOf('yclid_') === 0) return s.replace('yclid_', '');
  }
  return null;
}

const yclid = getYclid();

function buildFinalUrl(baseUrl) {
  if (!yclid) return baseUrl;
  const sep = baseUrl.includes('?') ? '&' : '?';
  return baseUrl + sep + 'yclid=' + encodeURIComponent(yclid);
}

// ============ РЕНДЕР СПИСКА ============
const listEl = document.getElementById('offerList');

function renderOffers(items) {
  listEl.innerHTML = '';
  items.forEach((offer, idx) => {
    const btn = document.createElement('button');
    btn.className = 'offer-btn';
    const icon = ICONS[idx % ICONS.length];
    btn.innerHTML =
      '<div class="offer-icon"><i class="ti ' + icon + '"></i></div>' +
      '<div style="min-width:0;flex:1;"><p class="offer-name">' + offer.name + '</p></div>' +
      '<i class="ti ti-chevron-right offer-chevron"></i>';
    btn.addEventListener('click', function () {
      const finalUrl = buildFinalUrl(offer.url);
      window.location.href = finalUrl;
    });
    listEl.appendChild(btn);
  });
}
